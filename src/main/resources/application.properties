# H2 Database (in-memory mode)
spring.datasource.url=jdbc:h2:mem:laptoprepair
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Logging basic
logging.level.org.springframework=INFO
logging.level.com.laptoprepair=DEBUG
logging.level.org.springframework.security=DEBUG

# Server port
server.port=8080

# UTF-8 encoding support
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Tomcat URI encoding
server.tomcat.uri-encoding=UTF-8
server.tomcat.relaxed-query-chars=|,{,},[,]

# Email Configuration (Mailhog for local testing)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Async for retry
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# File upload configuration
upload.dir=./uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Remove static resource configuration - will use controller instead

# Session configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.max-age=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.persistent=true

# Email Configuration - Additional Settings
spring.mail.from=noreply@shoplaptop.com
spring.mail.cc=admin@shoplaptop.com
app.public-request-base-url=http://localhost:8080/public/request/
app.shop.name=Laptop Repair Shop

# Application Behavior
pagination.default-page-size.requests=10
pagination.default-page-size.service-items=10
upload.max-images-per-request=5

# Security Configuration
app.security.staff.users=staff:staff123,admin:admin456,manager:manager789
app.security.login.default-success-url=/staff/requests/list