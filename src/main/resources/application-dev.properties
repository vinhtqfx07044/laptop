# PostgreSQL Database (Development)
spring.datasource.url=jdbc:postgresql://${POSTGRES_DEV_HOST}:${POSTGRES_DEV_PORT}/${POSTGRES_DEV_DB}
spring.datasource.username=${POSTGRES_DEV_USER}
spring.datasource.password=${POSTGRES_DEV_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never

# Email Configuration (for Gmail)
spring.mail.host=${GMAIL_HOST}
spring.mail.port=${GMAIL_PORT}
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${GMAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${GMAIL_SMTP_STARTTLS_ENABLE}
spring.mail.from=${GMAIL_FROM}
spring.mail.cc=${GMAIL_CC}

# Security configurations
app.security.staff.users=staff:staff123,admin:admin456,manager:manager789

# Public request base URL
app.public-request-base-url=http://localhost:8080/public/request/

# Rate Limiter Configuration
app.rate-limiter.max-requests-per-minute=5
app.rate-limiter.window-size-seconds=60