# PostgreSQL Database (Production)
spring.datasource.url=jdbc:postgresql://${POSTGRES_PROD_HOST}:${POSTGRES_PROD_PORT}/${POSTGRES_PROD_DB}
spring.datasource.username=${POSTGRES_PROD_USER}
spring.datasource.password=${POSTGRES_PROD_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never

# Email Configuration (for Gmail)
spring.mail.host=${GMAIL_HOST}
spring.mail.port=${GMAIL_PORT}
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${GMAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${GMAIL_SMTP_STARTTLS_ENABLE}
spring.mail.from=${GMAIL_FROM}
spring.mail.cc=${GMAIL_CC}

# Security configurations (IMPORTANT: Change for production, e.g., use external user management)
app.security.staff.users=staff:staff123,admin:admin456,manager:manager789
app.security.login.default-success-url=/staff/requests/list

# Public request base URL (IMPORTANT: Change to production domain)
app.public-request-base-url=http://your-production-domain.com/public/request/

# Rate Limiter Configuration (Adjust for production load)
app.rate-limiter.max-requests-per-minute=100 # Example: higher limit for production
app.rate-limiter.window-size-seconds=60