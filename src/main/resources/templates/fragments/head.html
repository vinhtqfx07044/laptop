<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" xml:lang="vi">

<head th:fragment="commonHead(title, includeValidation)">
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Repair Portal'">Repair Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="/css/app.css" rel="stylesheet">
    
    <!-- Chat Widget CSS -->
    <link href="/css/chat.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global JS -->
    <script th:src="@{/js/global.js}"></script>

    <!-- Bootstrap Validation JS (included conditionally) -->
    <script th:if="${includeValidation}" th:src="@{/js/bootstrap-validation.js}"></script>
    
    <!-- Chat Widget JS -->
    <script th:src="@{/js/chat.js}" defer></script>

</head>

</html>
